<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딜리셔스 채용 안내</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #F5F6FA;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    height: 90vh;
    max-height: 760px;
    overflow: hidden;
  }

  .chat-header {
    background: #1A1A2E;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .chat-header .avatar {
    width: 40px; height: 40px;
    background: #4A90D9;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .chat-header .info .name { color: #fff; font-size: 15px; font-weight: 600; }
  .chat-header .info .status { color: #8FA8C8; font-size: 12px; margin-top: 2px; }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  .msg { display: flex; align-items: flex-end; gap: 8px; }
  .msg.bot { justify-content: flex-start; }
  .msg.user { justify-content: flex-end; }

  .bot-avatar {
    width: 30px; height: 30px;
    background: #4A90D9;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
    word-break: keep-all;
    white-space: pre-wrap;
  }
  .msg.bot .bubble { background: #F0F4F9; color: #1A1A2E; border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: #4A90D9; color: #fff; border-bottom-right-radius: 4px; }

  .quick-section {
    flex-shrink: 0;
    padding: 8px 16px 10px;
    border-top: 1px solid #F0F0F0;
  }
  .quick-label {
    font-size: 11px;
    color: #B0B8C4;
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .quick-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }
  .quick-btn {
    background: #fff;
    border: 1.5px solid #E0E6EE;
    color: #3A5A8A;
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12.5px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1.3;
  }
  .quick-btn:hover { background: #EEF4FB; border-color: #4A90D9; color: #1A5DAD; }
  .quick-btn .icon { font-size: 14px; flex-shrink: 0; }

  .chat-input-area {
    padding: 10px 16px 14px;
    border-top: 1px solid #F0F0F0;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .chat-input-area textarea {
    flex: 1;
    border: 1.5px solid #E0E6EE;
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 100px;
    transition: border-color 0.15s;
    color: #1A1A2E;
    background: #fff;
  }
  .chat-input-area textarea:focus { border-color: #4A90D9; }
  .chat-input-area textarea::placeholder { color: #B0B8C4; }

  .send-btn {
    width: 42px; height: 42px;
    background: #4A90D9;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .send-btn:hover { background: #357ABD; }
  .send-btn:disabled { background: #C0D5EC; cursor: not-allowed; }

  .typing .bubble { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
  .dot {
    width: 7px; height: 7px;
    background: #8FA8C8;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  @media (max-width: 480px) {
    body { padding: 0; }
    .chat-wrapper { border-radius: 0; height: 100vh; max-height: none; }
  }
</style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">💼</div>
    <div class="info">
      <div class="name">딜리셔스 채용 안내</div>
      <div class="status">궁금한 점을 편하게 물어보세요!</div>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="quick-section">
    <div class="quick-label">자주 묻는 질문</div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="sendQuick('채용 프로세스가 어떻게 되나요?')"><span class="icon">📋</span>채용 프로세스</button>
      <button class="quick-btn" onclick="sendQuick('면접 결과는 언제 안내되나요?')"><span class="icon">📬</span>인터뷰 결과 안내</button>
      <button class="quick-btn" onclick="sendQuick('인터뷰 방식이 어떻게 되나요?')"><span class="icon">🗣️</span>인터뷰 방식</button>
      <button class="quick-btn" onclick="sendQuick('인터뷰 일정 변경이 가능한가요?')"><span class="icon">📅</span>일정 변경</button>
      <button class="quick-btn" onclick="sendQuick('딜리셔스 회사소개가 궁금해요')"><span class="icon">🏢</span>회사 소개</button>
      <button class="quick-btn" onclick="sendQuick('근무지가 어디인가요?')"><span class="icon">📍</span>근무지</button>
      <button class="quick-btn" onclick="sendQuick('현재 진행중인 포지션이 궁금해요')"><span class="icon">🔍</span>채용 포지션</button>
      <button class="quick-btn" onclick="sendQuick('담당자에게 직접 문의하고 싶어요')"><span class="icon">📞</span>담당자 문의</button>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="userInput" placeholder="질문을 직접 입력해도 돼요!" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwRWlEab-NdGUBiq1b_r4K16pxpF9-DUi_8SnXT-lHh8ETJNdyPTfHe8nhdLiB29xwoWw/exec';

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  function addMessage(text, role) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    if (role === 'bot') {
      msg.innerHTML = `<div class="bot-avatar">🤖</div><div class="bubble">${text}</div>`;
    } else {
      msg.innerHTML = `<div class="bubble">${text}</div>`;
    }
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg bot typing';
    msg.id = 'typing';
    msg.innerHTML = `<div class="bot-avatar">🤖</div><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    autoResize(inputEl);
    addMessage(text, 'user');
    sendBtn.disabled = true;
    addTyping();

    try {
      const url = SCRIPT_URL + '?question=' + encodeURIComponent(text);
      const res = await fetch(url, { method: 'GET' });
      const data = await res.json();
      removeTyping();
      addMessage(data.answer || '답변을 가져오지 못했어요. 다시 시도해주세요.', 'bot');
    } catch (e) {
      removeTyping();
      addMessage('일시적으로 연결이 어려워요. recruit@deali.net 으로 문의해주시면 빠르게 답변드릴게요! 😊', 'bot');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function sendQuick(text) {
    inputEl.value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  window.onload = () => {
    addMessage('안녕하세요 😊 딜리셔스 채용 안내 챗봇입니다!\n\n채용 프로세스, 인터뷰, 회사 소개 등 궁금한 내용이 있다면 아래 버튼 또는 직접 입력으로 편하게 문의해주세요 :)', 'bot');
  };
</script>
</body>
</html>
